name: Build Debian Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debhelper devscripts python3-all
        
    - name: Build package
      run: |
        dpkg-buildpackage -us -uc -b
        
    - name: Upload artifact
      uses: actions/upload-artifact@v2
      with:
        name: zerowall-deb
        path: ../zerowall_*.deb
